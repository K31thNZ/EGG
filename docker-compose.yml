version: '3.8'

services:
  wireguard:
    build: .
    container_name: wireguard-vpn
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - TZ=UTC
    ports:
      - "51820:51820/udp"
    volumes:
      - ./wg0.conf:/etc/wireguard/wg0.conf:ro
    restart: unless-stopped
    networks:
      - wg_network

networks:
  wg_network:
    driver: bridge
